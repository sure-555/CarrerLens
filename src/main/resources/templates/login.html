<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareerLens | Login</title>

    <link rel="stylesheet" href="/css/auth.css">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>CareerLens</h1>

        <p>
            Continue your AI-powered resume journey and
            discover how recruiters view your resume.
        </p>

    </div>

    <div class="right">

        <div class="card">

            <h2>Welcome Back</h2>

            <form id="loginForm">

                <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required>

                <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p id="message"></p>

            <p>
                Don't have an account?
                <a href="/register">Register</a>
            </p>

        </div>

    </div>

</div>

<script src="/js/login.js"></script>

</body>
</html>
