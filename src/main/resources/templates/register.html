<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareerLens | Register</title>

    <link rel="stylesheet" href="/css/style.css">

    <link rel="stylesheet" href="/css/auth.css">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>CareerLens</h1>

        <p>

            Create your account and start analyzing your resume using AI.

        </p>

    </div>


    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <form id="registerForm">

                <input
                        type="text"
                        id="name"
                        placeholder="Full Name"
                        required
                >

                <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                >

                <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                >

                <button type="submit">

                    Register

                </button>

            </form>

            <p id="message"></p>

            <p>

                Already have an account?

                <a href="/login">

                    Login

                </a>

            </p>

        </div>

    </div>

</div>

<script src="/js/register.js"></script>

</body>

</html>
